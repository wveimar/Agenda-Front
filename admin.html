<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Admin | Soluciones Musicales</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

   <style>
      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      :root {
         --bg-primary: #0f0f1e;
         --bg-secondary: #1a1a2e;
         --bg-card: #252540;
         --accent: #f5b942;
         --text-primary: #ffffff;
         --text-secondary: #b8b8d1;
         --border: rgba(245, 185, 66, 0.2);
      }

      body {
         font-family: 'Poppins', sans-serif;
         background: var(--bg-primary);
         color: var(--text-primary);
         min-height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
         padding: 20px;
      }

      .login-container {
         background: var(--bg-card);
         border-radius: 16px;
         padding: 40px;
         max-width: 400px;
         width: 100%;
         border: 1px solid var(--border);
         box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      .login-header {
         text-align: center;
         margin-bottom: 30px;
      }

      .login-header i {
         font-size: 3rem;
         color: var(--accent);
         margin-bottom: 15px;
      }

      .login-header h1 {
         font-size: 1.8rem;
         margin-bottom: 10px;
      }

      .login-header p {
         color: var(--text-secondary);
         font-size: 0.9rem;
      }

      .form-group {
         margin-bottom: 20px;
      }

      .form-group label {
         display: block;
         margin-bottom: 8px;
         font-weight: 600;
         font-size: 0.9rem;
      }

      .form-group input {
         width: 100%;
         padding: 12px 16px;
         background: var(--bg-secondary);
         border: 1px solid var(--border);
         border-radius: 10px;
         color: var(--text-primary);
         font-family: inherit;
         font-size: 1rem;
         transition: all 0.3s;
      }

      .form-group input:focus {
         outline: none;
         border-color: var(--accent);
         box-shadow: 0 0 0 3px rgba(245, 185, 66, 0.15);
      }

      .login-btn {
         width: 100%;
         padding: 14px;
         background: linear-gradient(135deg, #f5b942 0%, #ff6b6b 100%);
         color: var(--bg-primary);
         border: none;
         border-radius: 10px;
         font-family: inherit;
         font-weight: 600;
         font-size: 1rem;
         cursor: pointer;
         transition: transform 0.2s;
      }

      .login-btn:hover {
         transform: scale(1.02);
      }

      .login-btn:disabled {
         opacity: 0.6;
         cursor: not-allowed;
      }

      .error-message {
         background: rgba(255, 107, 107, 0.15);
         color: #ff6b6b;
         padding: 12px;
         border-radius: 8px;
         margin-bottom: 20px;
         font-size: 0.9rem;
         display: none;
      }

      .error-message.show {
         display: block;
      }

      /* Admin Dashboard */
      .admin-container {
         max-width: 1200px;
         width: 100%;
         display: none;
      }

      .admin-container.show {
         display: block;
      }

      .admin-header {
         display: flex;
         justify-content: space-between;
         align-items: center;
         margin-bottom: 30px;
         padding: 20px;
         background: var(--bg-card);
         border-radius: 12px;
         border: 1px solid var(--border);
      }

      .admin-header h1 {
         font-size: 1.5rem;
      }

      .logout-btn {
         padding: 10px 20px;
         background: rgba(255, 107, 107, 0.15);
         color: #ff6b6b;
         border: 1px solid rgba(255, 107, 107, 0.3);
         border-radius: 8px;
         cursor: pointer;
         font-family: inherit;
         font-weight: 600;
         transition: all 0.2s;
      }

      .logout-btn:hover {
         background: rgba(255, 107, 107, 0.25);
      }

      .events-table {
         width: 100%;
         background: var(--bg-card);
         border-radius: 12px;
         overflow: hidden;
         border: 1px solid var(--border);
      }

      table {
         width: 100%;
         border-collapse: collapse;
      }

      th {
         background: rgba(245, 185, 66, 0.1);
         padding: 16px;
         text-align: left;
         font-weight: 600;
         color: var(--accent);
         font-size: 0.85rem;
         text-transform: uppercase;
         letter-spacing: 0.5px;
      }

      td {
         padding: 16px;
         border-top: 1px solid var(--border);
         font-size: 0.95rem;
      }

      tr:hover {
         background: rgba(245, 185, 66, 0.05);
      }

      .loading {
         text-align: center;
         padding: 40px;
         color: var(--text-secondary);
      }

      .events-table {
         width: 100%;
         background: var(--bg-card);
         border-radius: 12px;
         overflow-x: auto;
         /* ← Agregar scroll horizontal */
         border: 1px solid var(--border);
      }

      table {
         width: 100%;
         border-collapse: collapse;
      }

      th,
      td {
         white-space: nowrap;
         /* ← Evita que el texto se parta */
      }

      .pay-btn {
         background: rgba(245, 185, 66, 0.15);
         color: var(--accent);
         border: 1px solid var(--border);
         padding: 6px 12px;
         border-radius: 6px;
         cursor: pointer;
         font-family: inherit;
         font-size: 0.85rem;
         font-weight: 600;
         display: inline-flex;
         align-items: center;
         gap: 6px;
         transition: all 0.2s;
      }

      .pay-btn:hover {
         background: var(--accent);
         color: var(--bg-primary);
         transform: scale(1.05);
      }

      /* Modal glassmorphism styles */
      .modal {
         display: none;
         position: fixed;
         top: 0;
         left: 0;
         width: 100%;
         height: 100%;
         background: rgba(15, 15, 30, 0.8);
         backdrop-filter: blur(8px);
         z-index: 1000;
         align-items: center;
         justify-content: center;
         padding: 20px;
         opacity: 0;
         transition: opacity 0.3s ease;
      }
      
      .modal.show {
         display: flex;
         opacity: 1;
      }

      .modal-content {
         background: var(--bg-card);
         border: 1px solid var(--border);
         border-radius: 16px;
         max-width: 800px;
         width: 100%;
         max-height: 90vh;
         overflow-y: auto;
         padding: 30px;
         box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
         position: relative;
         animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes modalSlideUp {
         from {
            transform: translateY(40px);
            opacity: 0;
         }
         to {
            transform: translateY(0);
            opacity: 1;
         }
      }

      .close-modal {
         position: absolute;
         top: 20px;
         right: 20px;
         background: transparent;
         border: none;
         color: var(--text-secondary);
         font-size: 1.5rem;
         cursor: pointer;
         transition: color 0.2s;
      }

      .close-modal:hover {
         color: #ff6b6b;
      }

      .modal-header {
         margin-bottom: 24px;
         border-bottom: 1px solid var(--border);
         padding-bottom: 15px;
      }

      .modal-header h2 {
         font-size: 1.6rem;
         color: var(--text-primary);
         display: flex;
         align-items: center;
         gap: 10px;
      }

      .modal-header p {
         color: var(--text-secondary);
         font-size: 0.9rem;
         margin-top: 5px;
      }

      .payments-summary {
         display: grid;
         grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
         gap: 15px;
         margin-bottom: 25px;
      }

      .summary-card {
         background: var(--bg-secondary);
         border: 1px solid var(--border);
         border-radius: 10px;
         padding: 15px;
         text-align: center;
      }

      .summary-card .label {
         font-size: 0.75rem;
         text-transform: uppercase;
         letter-spacing: 0.8px;
         color: var(--text-secondary);
         margin-bottom: 5px;
      }

      .summary-card .value {
         font-size: 1.3rem;
         font-weight: 700;
      }

      .summary-card.total { color: #f5b942; }
      .summary-card.paid { color: #4ade80; }
      .summary-card.pending { color: #ff6b6b; }

      .payments-list-section {
         margin-bottom: 30px;
      }

      .payments-list-section h3 {
         font-size: 1.1rem;
         margin-bottom: 12px;
         color: var(--accent);
         display: flex;
         align-items: center;
         gap: 8px;
      }

      .pago-table {
         width: 100%;
         border-collapse: collapse;
         margin-top: 10px;
      }

      .pago-table th {
         background: rgba(245, 185, 66, 0.05);
         font-size: 0.8rem;
         padding: 10px;
      }

      .pago-table td {
         padding: 10px;
         border-top: 1px solid rgba(245, 185, 66, 0.1);
         font-size: 0.9rem;
      }

      .pago-badge {
         display: inline-block;
         padding: 2px 8px;
         border-radius: 4px;
         font-size: 0.75rem;
         font-weight: 600;
         text-transform: uppercase;
      }

      .pago-badge.ingreso {
         background: rgba(74, 222, 128, 0.15);
         color: #4ade80;
      }

      .pago-badge.egreso {
         background: rgba(255, 107, 107, 0.15);
         color: #ff6b6b;
      }

      .new-payment-section {
         border-top: 1px solid var(--border);
         padding-top: 25px;
      }

      .new-payment-section h3 {
         font-size: 1.1rem;
         margin-bottom: 15px;
         color: var(--accent);
         display: flex;
         align-items: center;
         gap: 8px;
      }

      .payment-form-grid {
         display: grid;
         grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
         gap: 15px;
         margin-bottom: 15px;
      }

      .btn-submit-payment {
         background: linear-gradient(135deg, #f5b942 0%, #ff6b6b 100%);
         color: var(--bg-primary);
         border: none;
         padding: 12px 24px;
         font-family: inherit;
         font-weight: 600;
         border-radius: 8px;
         cursor: pointer;
         transition: all 0.2s;
         display: inline-flex;
         align-items: center;
         gap: 8px;
      }

      .btn-submit-payment:hover {
         transform: translateY(-2px);
         box-shadow: 0 4px 15px rgba(245, 185, 66, 0.3);
      }
   </style>
</head>

<body>

   <!-- LOGIN FORM -->
   <div class="login-container" id="loginContainer">
      <div class="login-header">
         <i class="fa-solid fa-lock"></i>
         <h1>Panel de Administración</h1>
         <p>Ingresa tus credenciales para acceder</p>
      </div>

      <div class="error-message" id="errorMessage"></div>

      <form id="loginForm">
         <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" required autocomplete="username">
         </div>

         <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" required autocomplete="current-password">
         </div>

         <button type="submit" class="login-btn" id="loginBtn">
            <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
         </button>
      </form>
   </div>

   <!-- ADMIN DASHBOARD -->
   <div class="admin-container" id="adminContainer">
      <div class="admin-header">
         <h1><i class="fa-solid fa-gauge-high"></i> Panel de Administración</h1>
         <button class="logout-btn" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
         </button>
      </div>

      <div id="eventsContainer">
         <div class="loading">
            <i class="fa-solid fa-spinner fa-spin"></i> Cargando datos...
         </div>
      </div>
   </div>

   <!-- MODAL DETALLE PAGOS -->
   <div class="modal" id="paymentsModal">
      <div class="modal-content">
         <button class="close-modal" id="closeModalBtn" onclick="closePaymentsModal()">
            <i class="fa-solid fa-xmark"></i>
         </button>
         
         <div class="modal-header">
            <h2><i class="fa-solid fa-wallet"></i> Detalle de Pagos</h2>
            <p id="modalSubtitle">Evento #1.0 - Mariachi (17/07/2026)</p>
         </div>

         <div class="payments-summary">
            <div class="summary-card total">
               <div class="label">Ingreso Total</div>
               <div class="value" id="summaryTotal">$0</div>
            </div>
            <div class="summary-card paid">
               <div class="label">Abonado / Pagado</div>
               <div class="value" id="summaryPaid">$0</div>
            </div>
            <div class="summary-card pending">
               <div class="label">Saldo Restante</div>
               <div class="value" id="summaryPending">$0</div>
            </div>
         </div>

         <div class="payments-list-section">
            <h3><i class="fa-solid fa-list-check"></i> Historial de Movimientos</h3>
            <div id="paymentsListContainer" style="overflow-x: auto;">
               <div class="loading" style="padding: 20px 0;">
                  <i class="fa-solid fa-spinner fa-spin"></i> Cargando historial...
               </div>
            </div>
         </div>

         <div class="new-payment-section">
            <h3><i class="fa-solid fa-plus"></i> Registrar Nuevo Pago</h3>
            <form id="newPaymentForm">
               <input type="hidden" id="formIdEvento">
               <div class="payment-form-grid">
                  <div class="form-group">
                     <label for="pagoFecha">Fecha</label>
                     <input type="date" id="pagoFecha" required>
                  </div>
                  <div class="form-group">
                     <label for="pagoConcepto">Concepto</label>
                     <input type="text" id="pagoConcepto" placeholder="abono, comision, etc." required>
                  </div>
                  <div class="form-group">
                     <label for="pagoMonto">Monto ($)</label>
                     <input type="number" id="pagoMonto" placeholder="50000" min="0" required>
                  </div>
               </div>
               <div class="payment-form-grid">
                  <div class="form-group">
                     <label for="pagoTipo">Tipo de Movimiento</label>
                     <select id="pagoTipo" required style="width:100%; padding:12px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:10px; color:var(--text-primary); font-family:inherit;">
                        <option value="ingreso">Ingreso</option>
                        <option value="egreso">Egreso</option>
                     </select>
                  </div>
                  <div class="form-group">
                     <label for="pagoCaja">Caja Destino/Origen</label>
                     <select id="pagoCaja" required style="width:100%; padding:12px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:10px; color:var(--text-primary); font-family:inherit;">
                        <option value="wveimar">Wveimar</option>
                        <option value="sebas">Sebas</option>
                     </select>
                  </div>
                  <div class="form-group">
                     <label for="pagoDetalle">Detalle / Notas</label>
                     <input type="text" id="pagoDetalle" placeholder="Transferencia Bancolombia, etc.">
                  </div>
               </div>
               <button type="submit" class="btn-submit-payment" id="submitPaymentBtn">
                  <i class="fa-solid fa-floppy-disk"></i> Guardar Pago
               </button>
            </form>
         </div>
      </div>
   </div>

   <script>
      const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:')
         ? "http://localhost:8787"
         : "https://soluciones-musicales-api.solucionesmusicalesorienteant.workers.dev";

      const loginContainer = document.getElementById('loginContainer');
      const adminContainer = document.getElementById('adminContainer');
      const loginForm = document.getElementById('loginForm');
      const errorMessage = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const eventsContainer = document.getElementById('eventsContainer');

      // Verificar si ya hay token al cargar
      window.addEventListener('DOMContentLoaded', () => {
         const token = localStorage.getItem('admin_token');
         if (token) {
            showAdminPanel();
         }
      });

      // Login
      loginForm.addEventListener('submit', async (e) => {
         e.preventDefault();

         const username = document.getElementById('username').value;
         const password = document.getElementById('password').value;

         loginBtn.disabled = true;
         loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';
         errorMessage.classList.remove('show');

         try {
            const response = await fetch(`${API_URL}/api/login`, {
               method: 'POST',
               headers: {
                  'Content-Type': 'application/json'
               },
               body: JSON.stringify({ username, password })
            });

            if (!response.ok) {
               const error = await response.json();
               throw new Error(error.error || 'Error en la autenticación');
            }

            const data = await response.json();

            // Guardar token
            localStorage.setItem('admin_token', data.token);

            // Mostrar panel admin
            showAdminPanel();

         } catch (error) {
            errorMessage.textContent = error.message;
            errorMessage.classList.add('show');
         } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión';
         }
      });

      // Logout
      logoutBtn.addEventListener('click', () => {
         localStorage.removeItem('admin_token');
         loginContainer.style.display = 'block';
         adminContainer.classList.remove('show');
         document.getElementById('username').value = '';
          document.getElementById('password').value = '';
       });

       eventsContainer.addEventListener('click', (e) => {
          const btn = e.target.closest('.pay-btn');
          if (!btn) return;
          const id = btn.dataset.id;
          const tipo = btn.dataset.tipo;
          const fecha = btn.dataset.fecha;
          const ingreso = Number(btn.dataset.ingreso) || 0;
          openPaymentsModal(id, tipo, fecha, ingreso);
       });

       // Mostrar panel admin
      async function showAdminPanel() {
         loginContainer.style.display = 'none';
         adminContainer.classList.add('show');

         await loadAdminData();
      }

      // Cargar datos admin
      async function loadAdminData() {
         const token = localStorage.getItem('admin_token');

         if (!token) {
            loginContainer.style.display = 'block';
            adminContainer.classList.remove('show');
            return;
         }

         try {
            const response = await fetch(`${API_URL}/api/admin`, {
               headers: {
                  'Authorization': `Bearer ${token}`
               }
            });

            if (response.status === 401) {
               // Token inválido o expirado
               localStorage.removeItem('admin_token');
               loginContainer.style.display = 'block';
               adminContainer.classList.remove('show');
               return;
            }

            if (!response.ok) {
               throw new Error('Error al cargar datos');
            }

            const events = await response.json();
            renderAdminTable(events);

         } catch (error) {
            eventsContainer.innerHTML = `
          <div class="loading" style="color: #ff6b6b;">
            <i class="fa-solid fa-triangle-exclamation"></i>
            Error al cargar datos: ${error.message}
          </div>
        `;
        }
       }

       // Renderizar tabla admin
      function renderAdminTable(events) {
         if (events.length === 0) {
            eventsContainer.innerHTML = `
      <div class="loading">
        <i class="fa-solid fa-inbox"></i>
        No hay eventos registrados
      </div>
    `;
            return;
         }

         const fmt = (n) => n ? '$' + Number(n).toLocaleString('es-CO') : '—';

         const html = `
    <div class="events-table" style="overflow-x: auto;">
      <table style="min-width: 1900px;">
        <thead>
          <tr>
            <th>Tipo</th>
            <th>Fecha</th>
            <th>Día</th>
            <th>Hora</th>
            <th>Lugar</th>
            <th>Cliente</th>
            <th>Responsable</th>
            <th>Nº Músicos</th>
            <th>Ingreso</th>
            <th>$/Músico</th>
            <th>Gestión</th>
            <th>Transporte</th>
            <th>Sonido</th>
            <th>Utilero</th>
            <th>Intermediario</th>
            <th>Abono</th>
            <th>Pagos</th>
            <th>Extras</th>
            <th>Gastos Evento</th>
            <th>Utilidades</th>
            <th>Notas</th>
            <th>Publicar</th>
          </tr>
        </thead>
        <tbody>
          ${events.map(e => `
            <tr>
              <td>${escapeHtml(e.tipo)}</td>
              <td>${escapeHtml(e.fecha)}</td>
              <td>${escapeHtml(e.dia) || '—'}</td>
              <td>${escapeHtml(e.hora) || '—'}</td>
              <td>${escapeHtml(e.lugar) || '—'}</td>
              <td>${escapeHtml(e.cliente) || '—'}</td>
              <td>${escapeHtml(e.responsable) || '—'}</td>
              <td>${e.numMusicos || '—'}</td>
              <td style="color: #4ade80; font-weight: 600;">${fmt(e.ingreso)}</td>
              <td>${fmt(e.pagoMusico)}</td>
              <td>${fmt(e.gestion)}</td>
              <td>${fmt(e.transporte)}</td>
              <td>${fmt(e.sonido)}</td>
              <td>${fmt(e.utilero)}</td>
              <td>${fmt(e.intermediario)}</td>
              <td>${fmt(e.abono)}</td>
              <td>
                 <button class="pay-btn" data-id="${escapeHtml(e.customId)}" data-tipo="${escapeHtml(e.tipo)}" data-fecha="${escapeHtml(e.fecha)}" data-ingreso="${e.ingreso || 0}">
                  <i class="fa-solid fa-money-bill-transfer"></i> Ver (${e.customId || '—'})
                </button>
              </td>
              <td>${fmt(e.extras)}</td>
              <td style="color: #ff6b6b;">${fmt(e.gastosEvento)}</td>
              <td style="color: #f5b942; font-weight: 700;">${fmt(e.utilidades)}</td>
              <td style="max-width: 200px; font-size: 0.85rem; color: var(--text-secondary);">${escapeHtml(e.notas) || '—'}</td>
              <td>${e.publicarEnWeb ? '✅' : '❌'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

         eventsContainer.innerHTML = html;
      }

      function escapeHtml(str) {
         if (str == null) return '';
         return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
             .replace(/>/g, '&gt;')
             .replace(/"/g, '&quot;')
             .replace(/'/g, '&#39;');
       }

      // ============ LÓGICA DE DETALLE DE PAGOS ============
      async function openPaymentsModal(idEvento, tipo, fecha, ingresoTotal) {
         const modal = document.getElementById('paymentsModal');
         const subtitle = document.getElementById('modalSubtitle');
         const formIdEvento = document.getElementById('formIdEvento');
         
         // Limpiar formulario y colocar valores por defecto
         document.getElementById('newPaymentForm').reset();
         document.getElementById('pagoFecha').value = new Date().toISOString().split('T')[0];
         formIdEvento.value = idEvento;
         
         subtitle.textContent = `Evento #${idEvento} - ${tipo} (${fecha})`;
         
         // Mostrar modal
         modal.classList.add('show');
         
         // Cargar movimientos
         await loadPaymentDetails(idEvento, ingresoTotal);
      }

      function closePaymentsModal() {
         const modal = document.getElementById('paymentsModal');
         modal.classList.remove('show');
      }

      async function loadPaymentDetails(idEvento, ingresoTotal) {
         const listContainer = document.getElementById('paymentsListContainer');
         const token = localStorage.getItem('admin_token');
         
         listContainer.innerHTML = `
            <div class="loading" style="padding: 20px 0;">
               <i class="fa-solid fa-spinner fa-spin"></i> Cargando historial...
            </div>
         `;
         
         try {
            const response = await fetch(`${API_URL}/api/admin/detallepagos?id_evento=${idEvento}`, {
               headers: {
                  'Authorization': `Bearer ${token}`
               }
            });
            
            if (!response.ok) {
               throw new Error('Error al consultar detalles de pago');
            }
            
            const pagos = await response.json();
            
            // Calcular total abonado
            let totalAbonado = 0;
            pagos.forEach(p => {
                if (p.tipo === 'ingreso' && (p.concepto || '').toLowerCase().includes('abono')) {
                  totalAbonado += Number(p.monto || 0);
               }
            });
            
            const totalPending = Number(ingresoTotal || 0) - totalAbonado;
            
            const fmt = (n) => '$' + Number(n).toLocaleString('es-CO');
            
            // Actualizar resúmenes
            document.getElementById('summaryTotal').textContent = fmt(ingresoTotal || 0);
            document.getElementById('summaryPaid').textContent = fmt(totalAbonado);
            document.getElementById('summaryPending').textContent = fmt(totalPending);
            
            if (pagos.length === 0) {
               listContainer.innerHTML = `
                  <div class="loading" style="padding: 20px 0; font-style: italic;">
                     <i class="fa-solid fa-folder-open"></i> No hay movimientos registrados para este evento.
                  </div>
               `;
               return;
            }
            
            // Renderizar tabla de movimientos del evento
            const html = `
               <table class="pago-table" style="min-width: 600px; width: 100%;">
                  <thead>
                     <tr>
                        <th>Fecha</th>
                        <th>Concepto</th>
                        <th>Monto</th>
                        <th>Tipo</th>
                        <th>Caja</th>
                        <th>Saldo</th>
                        <th>Detalle</th>
                     </tr>
                  </thead>
                  <tbody>
                     ${pagos.map(p => `
                        <tr>
                           <td>${escapeHtml(p.fecha)}</td>
                           <td><strong>${escapeHtml(p.concepto)}</strong></td>
                           <td style="font-weight: 600; color: ${p.tipo === 'ingreso' ? '#4ade80' : '#ff6b6b'}">
                              ${p.tipo === 'ingreso' ? '+' : '-'}${fmt(p.monto)}
                           </td>
                           <td>
                              <span class="pago-badge ${p.tipo === 'ingreso' ? 'ingreso' : 'egreso'}">
                                 ${escapeHtml(p.tipo)}
                              </span>
                           </td>
                           <td>${escapeHtml(p.caja)}</td>
                           <td>${fmt(p.saldo)}</td>
                           <td style="color: var(--text-secondary); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${escapeHtml(p.detalle)}">
                              ${escapeHtml(p.detalle) || '—'}
                           </td>
                        </tr>
                     `).join('')}
                  </tbody>
               </table>
            `;
            listContainer.innerHTML = html;
         } catch (error) {
            listContainer.innerHTML = `
               <div class="loading" style="color: #ff6b6b; padding: 20px 0;">
                  <i class="fa-solid fa-triangle-exclamation"></i> Error: ${error.message}
               </div>
            `;
         }
      }

      // Guardar nuevo pago
      document.getElementById('newPaymentForm').addEventListener('submit', async (e) => {
         e.preventDefault();
         
         const submitBtn = document.getElementById('submitPaymentBtn');
         const token = localStorage.getItem('admin_token');
         const idEvento = document.getElementById('formIdEvento').value;
         
         const payload = {
            idEvento: idEvento,
            fecha: document.getElementById('pagoFecha').value,
            concepto: document.getElementById('pagoConcepto').value,
            monto: Number(document.getElementById('pagoMonto').value),
            tipo: document.getElementById('pagoTipo').value,
            caja: document.getElementById('pagoCaja').value,
            detalle: document.getElementById('pagoDetalle').value
         };
         
         submitBtn.disabled = true;
         submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';
         
         try {
            const response = await fetch(`${API_URL}/api/admin/detallepagos`, {
               method: 'POST',
               headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${token}`
               },
               body: JSON.stringify(payload)
            });
            
            if (!response.ok) {
               const error = await response.json();
               throw new Error(error.error || 'Error al guardar el pago');
            }
            
            // Recargar listado en el modal
            const ingresoText = document.getElementById('summaryTotal').textContent;
            const ingresoTotal = Number(ingresoText.replace(/[^0-9]/g, ''));
            await loadPaymentDetails(idEvento, ingresoTotal);
            
            // Limpiar campos formulario
            document.getElementById('pagoConcepto').value = '';
            document.getElementById('pagoMonto').value = '';
            document.getElementById('pagoDetalle').value = '';
            
            // Actualizar tabla principal en segundo plano
            loadAdminData();
            
         } catch (error) {
            alert(`Error: ${error.message}`);
         } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Guardar Pago';
         }
      });
   </script>
</body>

</html>
