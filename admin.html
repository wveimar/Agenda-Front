<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Admin | Soluciones Musicales</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

   <style>
      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      :root {
         --bg-primary: #0f0f1e;
         --bg-secondary: #1a1a2e;
         --bg-card: #252540;
         --accent: #f5b942;
         --text-primary: #ffffff;
         --text-secondary: #b8b8d1;
         --border: rgba(245, 185, 66, 0.2);
      }

      body {
         font-family: 'Poppins', sans-serif;
         background: var(--bg-primary);
         color: var(--text-primary);
         min-height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
         padding: 20px;
      }

      .login-container {
         background: var(--bg-card);
         border-radius: 16px;
         padding: 40px;
         max-width: 400px;
         width: 100%;
         border: 1px solid var(--border);
         box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      .login-header {
         text-align: center;
         margin-bottom: 30px;
      }

      .login-header i {
         font-size: 3rem;
         color: var(--accent);
         margin-bottom: 15px;
      }

      .login-header h1 {
         font-size: 1.8rem;
         margin-bottom: 10px;
      }

      .login-header p {
         color: var(--text-secondary);
         font-size: 0.9rem;
      }

      .form-group {
         margin-bottom: 20px;
      }

      .form-group label {
         display: block;
         margin-bottom: 8px;
         font-weight: 600;
         font-size: 0.9rem;
      }

      .form-group input {
         width: 100%;
         padding: 12px 16px;
         background: var(--bg-secondary);
         border: 1px solid var(--border);
         border-radius: 10px;
         color: var(--text-primary);
         font-family: inherit;
         font-size: 1rem;
         transition: all 0.3s;
      }

      .form-group input:focus {
         outline: none;
         border-color: var(--accent);
         box-shadow: 0 0 0 3px rgba(245, 185, 66, 0.15);
      }

      .login-btn {
         width: 100%;
         padding: 14px;
         background: linear-gradient(135deg, #f5b942 0%, #ff6b6b 100%);
         color: var(--bg-primary);
         border: none;
         border-radius: 10px;
         font-family: inherit;
         font-weight: 600;
         font-size: 1rem;
         cursor: pointer;
         transition: transform 0.2s;
      }

      .login-btn:hover {
         transform: scale(1.02);
      }

      .login-btn:disabled {
         opacity: 0.6;
         cursor: not-allowed;
      }

      .error-message {
         background: rgba(255, 107, 107, 0.15);
         color: #ff6b6b;
         padding: 12px;
         border-radius: 8px;
         margin-bottom: 20px;
         font-size: 0.9rem;
         display: none;
      }

      .error-message.show {
         display: block;
      }

      /* Admin Dashboard */
      .admin-container {
         max-width: 1200px;
         width: 100%;
         display: none;
      }

      .admin-container.show {
         display: block;
      }

      .admin-header {
         display: flex;
         justify-content: space-between;
         align-items: center;
         margin-bottom: 30px;
         padding: 20px;
         background: var(--bg-card);
         border-radius: 12px;
         border: 1px solid var(--border);
      }

      .admin-header h1 {
         font-size: 1.5rem;
      }

      .logout-btn {
         padding: 10px 20px;
         background: rgba(255, 107, 107, 0.15);
         color: #ff6b6b;
         border: 1px solid rgba(255, 107, 107, 0.3);
         border-radius: 8px;
         cursor: pointer;
         font-family: inherit;
         font-weight: 600;
         transition: all 0.2s;
      }

      .logout-btn:hover {
         background: rgba(255, 107, 107, 0.25);
      }

      .events-table {
         width: 100%;
         background: var(--bg-card);
         border-radius: 12px;
         overflow: hidden;
         border: 1px solid var(--border);
      }

      table {
         width: 100%;
         border-collapse: collapse;
      }

      th {
         background: rgba(245, 185, 66, 0.1);
         padding: 16px;
         text-align: left;
         font-weight: 600;
         color: var(--accent);
         font-size: 0.85rem;
         text-transform: uppercase;
         letter-spacing: 0.5px;
      }

      td {
         padding: 16px;
         border-top: 1px solid var(--border);
         font-size: 0.95rem;
      }

      tr:hover {
         background: rgba(245, 185, 66, 0.05);
      }

      .loading {
         text-align: center;
         padding: 40px;
         color: var(--text-secondary);
      }
   </style>
</head>

<body>

   <!-- LOGIN FORM -->
   <div class="login-container" id="loginContainer">
      <div class="login-header">
         <i class="fa-solid fa-lock"></i>
         <h1>Panel de Administración</h1>
         <p>Ingresa tus credenciales para acceder</p>
      </div>

      <div class="error-message" id="errorMessage"></div>

      <form id="loginForm">
         <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" required autocomplete="username">
         </div>

         <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" required autocomplete="current-password">
         </div>

         <button type="submit" class="login-btn" id="loginBtn">
            <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
         </button>
      </form>
   </div>

   <!-- ADMIN DASHBOARD -->
   <div class="admin-container" id="adminContainer">
      <div class="admin-header">
         <h1><i class="fa-solid fa-gauge-high"></i> Panel de Administración</h1>
         <button class="logout-btn" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
         </button>
      </div>

      <div id="eventsContainer">
         <div class="loading">
            <i class="fa-solid fa-spinner fa-spin"></i> Cargando datos...
         </div>
      </div>
   </div>

   <script>
      const API_URL = "https://soluciones-musicales-api.solucionesmusicalesorienteant.workers.dev";

      const loginContainer = document.getElementById('loginContainer');
      const adminContainer = document.getElementById('adminContainer');
      const loginForm = document.getElementById('loginForm');
      const errorMessage = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const eventsContainer = document.getElementById('eventsContainer');

      // Verificar si ya hay token al cargar
      window.addEventListener('DOMContentLoaded', () => {
         const token = localStorage.getItem('admin_token');
         if (token) {
            showAdminPanel();
         }
      });

      // Login
      loginForm.addEventListener('submit', async (e) => {
         e.preventDefault();

         const username = document.getElementById('username').value;
         const password = document.getElementById('password').value;

         loginBtn.disabled = true;
         loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';
         errorMessage.classList.remove('show');

         try {
            const response = await fetch(`${API_URL}/api/login`, {
               method: 'POST',
               headers: {
                  'Content-Type': 'application/json'
               },
               body: JSON.stringify({ username, password })
            });

            if (!response.ok) {
               const error = await response.json();
               throw new Error(error.error || 'Error en la autenticación');
            }

            const data = await response.json();

            // Guardar token
            localStorage.setItem('admin_token', data.token);

            // Mostrar panel admin
            showAdminPanel();

         } catch (error) {
            errorMessage.textContent = error.message;
            errorMessage.classList.add('show');
         } finally {
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión';
         }
      });

      // Logout
      logoutBtn.addEventListener('click', () => {
         localStorage.removeItem('admin_token');
         loginContainer.style.display = 'block';
         adminContainer.classList.remove('show');
         document.getElementById('username').value = '';
         document.getElementById('password').value = '';
      });

      // Mostrar panel admin
      async function showAdminPanel() {
         loginContainer.style.display = 'none';
         adminContainer.classList.add('show');

         await loadAdminData();
      }

      // Cargar datos admin
      async function loadAdminData() {
         const token = localStorage.getItem('admin_token');

         if (!token) {
            loginContainer.style.display = 'block';
            adminContainer.classList.remove('show');
            return;
         }

         try {
            const response = await fetch(`${API_URL}/api/admin`, {
               headers: {
                  'Authorization': `Bearer ${token}`
               }
            });

            if (response.status === 401) {
               // Token inválido o expirado
               localStorage.removeItem('admin_token');
               loginContainer.style.display = 'block';
               adminContainer.classList.remove('show');
               return;
            }

            if (!response.ok) {
               throw new Error('Error al cargar datos');
            }

            const events = await response.json();
            renderAdminTable(events);

         } catch (error) {
            eventsContainer.innerHTML = `
          <div class="loading" style="color: #ff6b6b;">
            <i class="fa-solid fa-triangle-exclamation"></i>
            Error al cargar datos: ${error.message}
          </div>
        `;
         }
      }

      // Renderizar tabla admin
      function renderAdminTable(events) {
         if (events.length === 0) {
            eventsContainer.innerHTML = `
          <div class="loading">
            <i class="fa-solid fa-inbox"></i>
            No hay eventos registrados
          </div>
        `;
            return;
         }

         const html = `
        <div class="events-table">
          <table>
            <thead>
              <tr>
                <th>Tipo</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Lugar</th>
                <th>Responsable</th>
                <th>Valor</th>
                <th>Utilidades</th>
                <th>Pago/Músico</th>
                <th>Estado Pago</th>
                <th>Publicar</th>
              </tr>
            </thead>
            <tbody>
              ${events.map(e => `
                <tr>
                  <td>${escapeHtml(e.tipo)}</td>
                  <td>${escapeHtml(e.fecha)}</td>
                  <td>${escapeHtml(e.hora) || '—'}</td>
                  <td>${escapeHtml(e.lugar) || '—'}</td>
                  <td>${escapeHtml(e.responsable) || '—'}</td>
                  <td>$${e.valor?.toLocaleString() || 0}</td>
                  <td>$${e.utilidades?.toLocaleString() || 0}</td>
                  <td>$${e.pagoMusico?.toLocaleString() || 0}</td>
                  <td>${escapeHtml(e.estadoPago)}</td>
                  <td>${e.publicarEnWeb ? '✅' : '❌'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

         eventsContainer.innerHTML = html;
      }

      function escapeHtml(str) {
         if (!str) return '';
         return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
      }
   </script>
</body>

</html>
